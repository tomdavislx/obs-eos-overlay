<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Eos Cue Overlay</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, sans-serif;
        color: white;
        font-weight: 600;
        text-shadow: 2px 2px 4px #000000;
        padding: 10px 20px;
      }

      #status {
        font-size: 14px;
        margin-bottom: 5px;
        opacity: 0.7;
        font-style: italic;
        transition: opacity 0.3s;
      }

      #status.status-connecting {
        color: #ffaa00;
      }

      #status.status-syncing {
        color: #00aaff;
      }

      #status.status-connected {
        color: #00ff00;
        opacity: 0;
        pointer-events: none;
      }

      #status.status-reconnecting {
        color: #ff6600;
      }

      #status.status-disconnected {
        color: #ff0000;
      }

      #main-cue {
        font-size: 24px;
        margin-bottom: 10px;
      }
      
      #running-cues {
        font-size: 12px;
        line-height: 1.4;
      }
      
      .cue-item {
        margin-bottom: 5px;
      }
      
      .cue-flash {
        color: #00ff00 !important;
        transition: none;
      }
      
      .cue-running {
        color: #00ff00;
      }
      
      .cue-completed {
        color: white;
        opacity: 0.7;
      }
      
      .cue-stale {
        color: #ff0000;
      }
    </style>
  </head>
  <body>
    <div id="status">Connecting...</div>
    <div id="main-cue">Waiting for cue...</div>
    <div id="running-cues"></div>

    <script>
      const statusElement = document.getElementById("status");
      const mainCueElement = document.getElementById("main-cue");
      const runningCuesElement = document.getElementById("running-cues");
      /**
       * WebSocket URL for the bridge (same port as HTTP when page is served by the bridge).
       * OBS Browser Source: use http://127.0.0.1:8081/ (or your WEBSOCKET_PORT), not file:// —
       * embedded Chromium often blocks file:// → WebSocket.
       * Remote bridge: open http://<bridge-ip>:8081/ or file://…?bridgeHost=<ip>&bridgePort=8081
       */
      const qs = new URLSearchParams(window.location.search || "");
      function computeBridgeWsUrl() {
        const hostParam = qs.get("bridgeHost") || qs.get("wsHost");
        const portStr = qs.get("bridgePort") || qs.get("wsPort");
        const portNum =
          portStr != null && portStr !== ""
            ? Number(portStr) || 8081
            : null;

        if (hostParam) {
          const p = portNum ?? 8081;
          return `ws://${hostParam}:${p}`;
        }

        if (
          window.location.protocol === "http:" ||
          window.location.protocol === "https:"
        ) {
          const scheme =
            window.location.protocol === "https:" ? "wss:" : "ws:";
          return `${scheme}//${window.location.host}`;
        }

        const p = portNum ?? 8081;
        return `ws://127.0.0.1:${p}`;
      }
      const bridgeWsUrl = () => computeBridgeWsUrl();

      let activeCueElements = new Map(); // Track DOM elements for each cue
      let lastFlashedCue = null;
      let instantCueTimeout = null; // Track timeout for instant cue visual delay
      let lastCueState = {}; // Track last state of each cue (for detecting transitions)

      function updateStatus(status, message) {
        // Remove all status classes
        statusElement.className = '';

        // Add new status class
        if (status) {
          statusElement.className = `status-${status}`;
        }

        // Update text
        const statusText = {
          'connecting': 'Connecting...',
          'syncing': message || 'Syncing...',
          'connected': message || 'Connected',
          'reconnecting': message || 'Reconnecting...',
          'disconnected': message || 'Disconnected'
        };

        statusElement.textContent = statusText[status] || message || status;
      }

      function connect() {
        const wsUrl = bridgeWsUrl();
        console.log("Connecting to bridge WebSocket:", wsUrl);
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          console.log("Connected to WebSocket bridge.");
          // Server sends CONNECTION_STATUS next; "syncing" reads as actively linked
          updateStatus("syncing", "Bridge socket open…");
          if (
            mainCueElement.textContent.startsWith("Waiting for bridge") ||
            mainCueElement.textContent === "Waiting for connection..."
          ) {
            mainCueElement.textContent = "Waiting for cue...";
          }
        };

        ws.onmessage = (event) => {
          let message;
          try {
            message = JSON.parse(event.data);
          } catch (e) {
            console.error("Overlay: bad JSON from bridge", e, event.data);
            return;
          }

          // Handle different message types
          if (message.type === 'CUE_UPDATE') {
            const data = message.data;
            if (data.latestCue) {
              updateMainCue(data.latestCue);
              updateRunningCues(data.activeCues);
            }
            // If no active cues, leave the display as-is — the console is almost
            // certainly sitting on a completed cue that will arrive shortly.
          } else if (message.type === 'CONNECTION_STATUS') {
            // Update status display
            if (message.data.status) {
              updateStatus(message.data.status, message.data.message);
            }
          } else {
            // Legacy format (fallback)
            if (message.singleCue) {
              mainCueElement.textContent = message.singleCue.raw || "Error parsing cue";
            } else if (message.latestCue) {
              updateMainCue(message.latestCue);
              updateRunningCues(message.activeCues);
            }
          }
        };

        ws.onclose = (ev) => {
          const code = ev.code;
          const reason = (ev.reason && String(ev.reason).trim()) || "—";
          console.warn(
            "Overlay WebSocket closed. code=%s reason=%s target=%s",
            code,
            reason,
            wsUrl
          );
          // 1006 = abnormal (no close frame): wrong host/port, firewall, server down, etc.
          updateStatus(
            "disconnected",
            `No bridge WS — retry in 3s  ${bridgeWsUrl()}  (close ${code})`
          );
          mainCueElement.textContent =
            "Waiting for bridge WebSocket — in OBS use http://127.0.0.1:PORT/ not a local file";
          runningCuesElement.innerHTML = "";
          activeCueElements.clear();
          setTimeout(connect, 3000);
        };

        ws.onerror = (err) => {
          console.error("WebSocket error (see close event for code):", err, wsUrl);
        };
      }

      function updateMainCue(latestCue) {
        mainCueElement.textContent = `LXQ: ${latestCue.cueNumber} - ${latestCue.label}`;

        const isNewCue = lastFlashedCue !== latestCue.cueId;
        const lastState = lastCueState[latestCue.cueId] || {};

        // Check if this is an instant completion (just reached 100% with time=0)
        const justCompletedInstantly =
          latestCue.time === 0 &&
          latestCue.percentage === '100%' &&
          lastState.percentage !== '100%';

        // Update state tracking
        lastCueState[latestCue.cueId] = {
          percentage: latestCue.percentage,
          isRunning: latestCue.isRunning
        };

        if (isNewCue) {
          // Clear any existing instant cue timeout
          if (instantCueTimeout) {
            clearTimeout(instantCueTimeout);
            instantCueTimeout = null;
          }

          lastFlashedCue = latestCue.cueId;

          // Normal new cue handling
          if (latestCue.isRunning) {
            mainCueElement.className = 'cue-running';
          } else {
            mainCueElement.className = 'cue-completed';
          }
        } else if (justCompletedInstantly) {
          // Instant completion detected! Flash green for 0.1s
          if (instantCueTimeout) {
            clearTimeout(instantCueTimeout);
          }

          // Show green immediately
          mainCueElement.className = 'cue-running';

          // Schedule switch to white after 0.1s
          instantCueTimeout = setTimeout(() => {
            if (lastFlashedCue === latestCue.cueId) {
              mainCueElement.className = 'cue-completed';
            }
            instantCueTimeout = null;
          }, 100);
        } else {
          // Update existing cue status (only if not during instant cue flash)
          if (!instantCueTimeout) {
            if (latestCue.isStale) {
              mainCueElement.className = 'cue-stale';
            } else if (latestCue.isRunning) {
              mainCueElement.className = 'cue-running';
            } else {
              mainCueElement.className = 'cue-completed';
            }
          }
        }
      }

      function updateRunningCues(activeCues) {
        // Skip the first cue (it's shown in main display)
        const runningCues = activeCues.slice(1);
        
        // Remove elements for cues no longer active
        for (const [cueId, element] of activeCueElements) {
          if (!activeCues.find(cue => cue.cueId === cueId)) {
            if (element.parentNode) {
              element.parentNode.removeChild(element);
            }
            activeCueElements.delete(cueId);
          }
        }
        
        // Update or create elements for running cues
        runningCues.forEach(cue => {
          let element = activeCueElements.get(cue.cueId);
          
          if (!element) {
            // Create new element
            element = document.createElement('div');
            element.className = 'cue-item cue-running';
            runningCuesElement.appendChild(element);
            activeCueElements.set(cue.cueId, element);
          }
          
          // Update content and status
          element.textContent = `${cue.cueNumber} - ${cue.label}`;
          
          if (cue.percentage === '100%') {
            element.className = 'cue-item cue-completed';
          } else {
            element.className = 'cue-item cue-running';
          }
        });
      }

      connect();
    </script>
  </body>
</html>
